<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer | Apple Pro Style</title>
    <meta name="description" content="Premium Pomodoro timer with task management. Clean, minimal, professional.">
    <meta name="theme-color" content="#1c1c1e">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- APP CONTAINER -->
<div id="app" class="app-container">
    
    <!-- HEADER -->
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">Focus Timer</h1>
        </div>
        <div class="header-right">
            <button id="settingsBtn" class="icon-btn" aria-label="Settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- TIMER PANEL -->
        <section class="timer-panel glass-card">
            <!-- MODE TABS -->
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="pomodoro">
                    <span>Pomodoro</span>
                    <span class="mode-duration">25m</span>
                </button>
                <button class="mode-tab" data-mode="shortBreak">
                    <span>Short Break</span>
                    <span class="mode-duration">5m</span>
                </button>
                <button class="mode-tab" data-mode="longBreak">
                    <span>Long Break</span>
                    <span class="mode-duration">15m</span>
                </button>
                <button class="mode-tab" data-mode="stopwatch">
                    <span>Stopwatch</span>
                    <span class="mode-duration">Free</span>
                </button>
            </div>

            <!-- DIGITAL TIMER DISPLAY -->
            <div class="timer-display">
                <div id="timerValue" class="timer-value">25:00</div>
                <div id="timerStatus" class="timer-status">Ready</div>
            </div>

            <!-- CONTROLS -->
            <div class="timer-controls">
                <button id="playPauseBtn" class="control-btn primary" aria-label="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <button id="skipBtn" class="control-btn secondary" aria-label="Skip">
                    <i class="fas fa-forward"></i>
                </button>
                <button id="resetBtn" class="control-btn secondary" aria-label="Reset">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </section>

        <!-- TASKS PANEL -->
        <section class="tasks-panel glass-card">
            <h2 class="panel-title">Tasks</h2>

            <!-- SEARCH -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input id="searchInput" type="search" placeholder="Search tasks..." aria-label="Search tasks">
            </div>

            <!-- PRIORITY FILTERS -->
            <div class="priority-filters">
                <button class="priority-filter active" data-priority="all">All</button>
                <button class="priority-filter" data-priority="low" style="--color: #10b981;">Low</button>
                <button class="priority-filter" data-priority="medium" style="--color: #f59e0b;">Medium</button>
                <button class="priority-filter" data-priority="high" style="--color: #ef4444;">High</button>
            </div>

            <!-- ADD TASK FORM -->
            <form id="taskForm" class="task-form">
                <div class="form-group">
                    <input 
                        id="taskInput" 
                        type="text" 
                        placeholder="Add a new task..." 
                        required
                        aria-label="Task title"
                    >
                    <select id="prioritySelect" aria-label="Task priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button type="submit" class="btn-add" aria-label="Add task">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </form>

            <!-- TASKS LIST -->
            <div id="tasksList" class="tasks-list">
                <!-- Tasks rendered here -->
            </div>
        </section>

    </main>

</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content glass-card">
        <div class="modal-header">
            <h2>Settings</h2>
            <button id="closeModalBtn" class="icon-btn" aria-label="Close settings">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <label class="toggle-item">
                <input id="soundToggle" type="checkbox" checked>
                <span class="toggle-switch"></span>
                <span>Sound Alerts</span>
            </label>
            <label class="toggle-item">
                <input id="notificationsToggle" type="checkbox" checked>
                <span class="toggle-switch"></span>
                <span>Notifications</span>
            </label>
        </div>
    </div>
</div>

<!-- TOAST NOTIFICATIONS -->
<div id="toastContainer" class="toast-container" aria-live="polite"></div>

<!-- JAVASCRIPT -->
<script src="script.js"></script>

</body>
</html>
